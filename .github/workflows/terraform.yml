name: Terraform

# 학생 계정(SCP DenyAllWithoutMFA + IAM Access Key 발급 차단) 운영 결정으로
# CI에서는 plan/apply를 자동 실행하지 않는다. 정적 가드(fmt + validate + TFLint
# + Checkov)만 PR/push에서 강제하고, 실 plan/apply는 사용자가 AWS CloudShell에서
# 수동 실행한다 (infra/terraform/README.md "Terraform 사용 — AWS CloudShell" 참조).

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
      - ".checkov.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
      - ".tflint.hcl"
      - ".checkov.yml"

# Workflow 전체 default = read-only (Principle of Least Privilege).
# 정적 가드만 실행하므로 AWS credentials / id-token / PR 코멘트 권한 모두 불필요.
permissions:
  contents: read

env:
  TF_VERSION: "1.15.1"

jobs:
  static-checks:
    name: Static checks (fmt / validate / TFLint / Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt -check
        run: terraform fmt -check -recursive infra/terraform

      - name: Validate (each module + each environment)
        run: |
          set -euo pipefail
          for d in $(find infra/terraform -type f -name '*.tf' -exec dirname {} \; | sort -u); do
            echo "::group::validate $d"
            (cd "$d" && terraform init -backend=false -input=false && terraform validate)
            echo "::endgroup::"
          done

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.62.0

      - name: TFLint
        run: |
          tflint --init --config="$PWD/.tflint.hcl"
          # `validate` 잡이 `terraform init`으로 .terraform/modules에 외부 모듈을 다운로드해 둔 상태.
          # find가 그 하위까지 들어가면 외부 모듈 코드의 warning이 잡힘 → -prune으로 .terraform 제외.
          # -maxdepth 3로 우리 자체 디렉토리만(bootstrap / environments/{env} / modules/{name}) 매칭.
          for d in $(find infra/terraform -name .terraform -prune -o \
              -mindepth 2 -maxdepth 3 -type d \
              \( -path '*/modules/*' -o -path '*/environments/*' -o -path '*/bootstrap' \) -print); do
            echo "::group::tflint $d"
            tflint --config="$PWD/.tflint.hcl" --chdir="$d"
            echo "::endgroup::"
          done

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          framework: terraform
          config_file: .checkov.yml
          quiet: true
          soft_fail: false
